name: 📊 Update GitHub Metrics

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    name: Generate Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: 📊 Core Metrics (Overview)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: VivekShukla-2504
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          filename: metrics/metrics-overview.svg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: commit

      - name: 📈 Language Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: VivekShukla-2504
          template: classic
          base: ""
          filename: metrics/metrics-languages.svg
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          output_action: commit

      - name: 🏆 Achievements & Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: VivekShukla-2504
          template: classic
          base: ""
          filename: metrics/metrics-achievements.svg
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0
          output_action: commit

      - name: 💬 WakaTime Coding Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: VivekShukla-2504
          template: classic
          base: ""
          filename: metrics/metrics-wakatime.svg
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 7
          plugin_wakatime_limit: 8
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          output_action: commit
