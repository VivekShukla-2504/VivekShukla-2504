<svg xmlns="http://www.w3.org/2000/svg" width="500" height="340" viewBox="0 0 500 340">
  <defs>
    <linearGradient id="javaBar"   x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00f5ff"/><stop offset="100%" stop-color="#7b2fff"/></linearGradient>
    <linearGradient id="pyBar"     x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00f5ff"/><stop offset="100%" stop-color="#0096c7"/></linearGradient>
    <linearGradient id="reactBar"  x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00f5ff"/><stop offset="100%" stop-color="#00b4d8"/></linearGradient>
    <linearGradient id="sbBar"     x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#39d353"/><stop offset="100%" stop-color="#00f5ff"/></linearGradient>
    <linearGradient id="sqlBar"    x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ff6b35"/></linearGradient>
    <linearGradient id="mlBar"     x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff6b9d"/><stop offset="100%" stop-color="#c94b4b"/></linearGradient>
    <style>
      .bg   { fill: #0d1117; }
      .rail { fill: #161b22; rx: 4; }
      .lbl  { font: 500 13px 'Courier New', monospace; fill: #c9d1d9; }
      .pct  { font: bold 12px 'Courier New', monospace; fill: #00f5ff; }
    </style>
  </defs>

  <!-- Card background -->
  <rect class="bg" width="500" height="340" rx="10"/>
  <rect x="1" y="1" width="498" height="338" rx="10" fill="none" stroke="#00f5ff" stroke-width="0.5" opacity="0.4"/>

  <!-- Title -->
  <text x="16" y="28" font="bold 14px 'Courier New'" font-weight="bold" font-size="14" font-family="'Courier New', monospace" fill="#00f5ff" letter-spacing="2">// SKILL PROFICIENCY</text>

  <!-- Java -->
  <text class="lbl" x="16"  y="60">☕ Java</text>
  <text class="pct" x="484" y="60" text-anchor="end">95%</text>
  <rect x="16" y="66" width="468" height="8" rx="4" fill="#1c2128"/>
  <rect x="16" y="66" width="444" height="8" rx="4" fill="url(#javaBar)"/>

  <!-- Python -->
  <text class="lbl" x="16"  y="102">🐍 Python</text>
  <text class="pct" x="484" y="102" text-anchor="end">85%</text>
  <rect x="16" y="108" width="468" height="8" rx="4" fill="#1c2128"/>
  <rect x="16" y="108" width="398" height="8" rx="4" fill="url(#pyBar)"/>

  <!-- React -->
  <text class="lbl" x="16"  y="144">⚛ React</text>
  <text class="pct" x="484" y="144" text-anchor="end">75%</text>
  <rect x="16" y="150" width="468" height="8" rx="4" fill="#1c2128"/>
  <rect x="16" y="150" width="351" height="8" rx="4" fill="url(#reactBar)"/>

  <!-- Spring Boot -->
  <text class="lbl" x="16"  y="186">🌱 Spring Boot</text>
  <text class="pct" x="484" y="186" text-anchor="end">60%</text>
  <rect x="16" y="192" width="468" height="8" rx="4" fill="#1c2128"/>
  <rect x="16" y="192" width="280" height="8" rx="4" fill="url(#sbBar)"/>

  <!-- SQL -->
  <text class="lbl" x="16"  y="228">🗄 SQL</text>
  <text class="pct" x="484" y="228" text-anchor="end">90%</text>
  <rect x="16" y="234" width="468" height="8" rx="4" fill="#1c2128"/>
  <rect x="16" y="234" width="421" height="8" rx="4" fill="url(#sqlBar)"/>

  <!-- ML -->
  <text class="lbl" x="16"  y="270">🧠 Machine Learning</text>
  <text class="pct" x="484" y="270" text-anchor="end">55%</text>
  <rect x="16" y="276" width="468" height="8" rx="4" fill="#1c2128"/>
  <rect x="16" y="276" width="257" height="8" rx="4" fill="url(#mlBar)"/>

  <!-- Footer -->
  <text x="250" y="318" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#484f58">VivekShukla-2504 · Updated 2026</text>
</svg>
